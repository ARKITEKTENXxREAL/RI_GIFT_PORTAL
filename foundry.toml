[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

# Optimizer required - PLGGovernor and PLGGiftRouter exceed EIP-170 24576 byte limit without it
optimizer = true
optimizer_runs = 200

# ─ Chain RPC profiles ─
# Set env vars before deploying:
#   export ETHEREUM_RPC_URL=https://...
#   export OPTIMISM_RPC_URL=https://...
#   export ARBITRUM_RPC_URL=https://...
#   export DEPLOYER_PRIVATE_KEY=0x...
#   export ETHERSCAN_API_KEY=...
#   export OPTIMISM_ETHERSCAN_API_KEY=...
#   export ARBISCAN_API_KEY=...

[rpc_endpoints]
ethereum  = "${ETHEREUM_RPC_URL}"
optimism  = "${OPTIMISM_RPC_URL}"
arbitrum  = "${ARBITRUM_RPC_URL}"
localhost = "http://127.0.0.1:8545"

[etherscan]
ethereum = { key = "${ETHERSCAN_API_KEY}" }
optimism = { key = "${OPTIMISM_ETHERSCAN_API_KEY}", url = "https://api-optimistic.etherscan.io/api" }
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
